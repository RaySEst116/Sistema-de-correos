<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alhmail - Inbox</title>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://unpkg.com/sweetalert2@11"></script>
    <!-- Quill Editor -->
    <link href="https://unpkg.com/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <script src="https://unpkg.com/quill@2.0.2/dist/quill.js"></script>
    <!-- Global Styles -->
    <style>
        /* --- VARIABLES GLOBALES --- */
        :root {
            --primary-red: #D50032;
            --dark-magenta: #8B0037;
            --accent-orange: #FF6B35;
            --bg-main: #F5F7FA;
            --bg-card: #FFFFFF;
            --bg-hover: #F3F4F6;
            --bg-sidebar: #FFFFFF;
            --text-main: #374151;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
            --oxide-red: #D50032;
            --success-green: #10B981;
        }

        /* --- DARK MODE --- */
        body.dark {
            --bg-main: #111827;
            --bg-card: #1F2937;
            --bg-hover: #374151;
            --bg-sidebar: #1F2937;
            --text-main: #F9FAFB;
            --text-muted: #9CA3AF;
            --border-color: #374151;
        }

        /* --- ESTILOS BASE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
        }

        #root {
            height: 100vh;
            width: 100vw;
        }

        /* --- ANIMATIONS --- */
        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .animate-slideUp {
            animation: slideUp 0.3s ease;
        }

        .animate-fadeIn {
            animation: fadeIn 0.3s ease;
        }

        /* --- LOADING SPINNER --- */
        .fa-spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-hover);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 768px) {
            body {
                font-size: 14px;
            }

            .sidebar {
                position: fixed !important;
                left: -250px;
                top: 0;
                height: 100vh;
                z-index: 1000;
                transition: left 0.3s ease;
                box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            }

            .sidebar.mobile-open {
                left: 0;
            }

            .sidebar-overlay {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
                display: none;
            }

            .sidebar-overlay.mobile-open {
                display: block;
            }

            .mobile-menu-toggle {
                display: block !important;
                position: fixed;
                top: 15px;
                left: 15px;
                z-index: 1001;
                background: var(--primary-red, #D50032);
                color: white;
                border: none;
                border-radius: 8px;
                padding: 10px;
                cursor: pointer;
                font-size: 16px;
                box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            }

            .email-list-container {
                width: 100% !important;
                max-width: none !important;
                border-right: none !important;
            }

            .email-detail-container {
                position: fixed !important;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 1002;
                background: var(--bg-card, #ffffff);
                transform: translateX(100%);
                transition: transform 0.3s ease;
                border-radius: 0 !important;
                margin: 0 !important;
            }

            .email-detail-container.mobile-open {
                transform: translateX(0);
            }

            .compose-modal {
                width: 95% !important;
                max-width: none !important;
                margin: 2.5% auto !important;
                height: 95vh !important;
                max-height: none !important;
            }

            .admin-panel-button {
                bottom: 70px !important;
                right: 15px !important;
                padding: 8px 12px !important;
                font-size: 12px !important;
            }
        }

        @media (max-width: 480px) {
            body {
                font-size: 13px;
            }

            .compose-modal {
                width: 98% !important;
                margin: 1% auto !important;
                height: 98vh !important;
            }

            .mobile-menu-toggle {
                top: 10px;
                left: 10px;
                padding: 8px;
                font-size: 14px;
            }

            .admin-panel-button {
                bottom: 80px !important;
                right: 10px !important;
                padding: 6px 10px !important;
                font-size: 11px !important;
            }
        }

        @media (min-width: 769px) {
            .mobile-menu-toggle,
            .sidebar-overlay {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
