version: '3.8'

services:
  backend:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    container_name: alhmail-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    networks:
      - alhmail-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./Alhmail
      dockerfile: Dockerfile
    container_name: alhmail-frontend
    ports:
      - "4174:4174"
    depends_on:
      - backend
    networks:
      - alhmail-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4174"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  alhmail-network:
    driver: bridge

volumes:
  node_modules_backend:
    driver: local
